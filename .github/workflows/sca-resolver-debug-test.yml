name: SCA Resolver Debug Log Test
on:
  workflow_dispatch:

jobs:
  sca-resolver-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download SCA Resolver
        run: |
          wget <URL_TO_SCA_RESOLVER_BINARY>
          chmod +x ./ScaResolver

      - name: Run SCA Resolver with Debug Logging
        run: ./ScaResolver offline -s . -n test-project -r result.json --log-level debug > sca_resolver_debug.log 2>&1

      - name: Upload SCA Resolver Debug Log
        uses: actions/upload-artifact@v3
        with:
          name: sca-resolver-debug-log
          path: sca_resolver_debug.log
